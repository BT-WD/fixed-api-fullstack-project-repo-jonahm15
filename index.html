<!DOCTYPE html>
<html>
<head>
  <title>Dog Browser</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
  <h1>Dog Explorer</h1>

  <select id="breedSelect" onchange="loadBreed()">
    <option value="">Select breed</option>
  </select>

<select id="subBreedSelect" onchange="loadImages()" style="display:none;">
  <option value="">Select sub-breed</option>
</select>

  <br>

  <select id="subBreedSelect" onchange="loadImages()">
    <option value="">Select sub-breed</option>
  </select>

  <img id="dogImage" src="https://via.placeholder.com/500x300">

  <br>

  <button onclick="prevImage()">Previous</button>
  <button onclick="nextImage()">Next</button>
</div>

<script src="index.js"></script>
</body>
</html>
